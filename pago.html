<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>JIGA LAB | Datos de Envío</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --verde: #8a9a5b; --negro: #121212; }
        body { 
            font-family: 'Inter', sans-serif; margin: 0; 
            background: linear-gradient(135deg, #fdfdfd 0%, #e9ebe2 100%);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .card { 
            background: rgba(255, 255, 255, 0.9); padding: 50px; width: 100%; max-width: 450px; 
            border-radius: 30px; box-shadow: 0 30px 60px rgba(0,0,0,0.08);
            border: 1px solid #fff; backdrop-filter: blur(10px);
        }
        h2 { font-weight: 200; letter-spacing: 5px; text-transform: uppercase; text-align: center; margin-bottom: 40px; color: var(--negro); }
        .input-group { position: relative; margin-bottom: 20px; }
        input { 
            width: 100%; padding: 18px; background: #fff; border: 1px solid #eee; 
            border-radius: 12px; box-sizing: border-box; font-family: 'Inter'; 
            transition: 0.3s; font-size: 14px;
        }
        input:focus { outline: none; border-color: var(--verde); box-shadow: 0 0 10px rgba(138, 154, 91, 0.1); }
        
        .btn-send { 
            width: 100%; padding: 20px; background: #25d366; color: #fff; border: none; 
            font-size: 13px; letter-spacing: 3px; text-transform: uppercase; 
            cursor: pointer; transition: 0.4s; border-radius: 12px; font-weight: 600;
            margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-send:hover { background: #121212; transform: scale(1.02); }
        .back { display: block; text-align: center; margin-top: 20px; font-size: 10px; color: #aaa; text-decoration: none; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>FINALIZAR PEDIDO</h2>
        <input type="text" id="nom" placeholder="Nombre Completo">
        <input type="text" id="dir" placeholder="Calle, Número y Colonia">
        <input type="text" id="cp" placeholder="Código Postal">
        <input type="tel" id="tel" placeholder="WhatsApp de contacto">
        
        <button class="btn-send" onclick="finish()">
            ENVIAR A WHATSAPP
        </button>
        <a href="carrito.html" class="back">MODIFICAR MI CARRITO</a>
    </div>

    <script>
        function finish() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const n = document.getElementById('nom').value;
            const d = document.getElementById('dir').value;
            const c = document.getElementById('cp').value;
            const t = document.getElementById('tel').value;

            if(!n || !d || !c || !t) return alert("Por favor, completa tus datos para la entrega.");

            let items = cart.map(i => `• ${i.n} (x${i.qty})`).join('%0A');
            let total = cart.reduce((a, b) => a + (b.p * b.qty), 0);
            const text = `Hola JIGA LAB!%0AQuiero realizar el siguiente pedido:%0A%0A${items}%0A%0A*Total: $${total}.00*%0A%0A*DATOS DE ENVÍO:*%0ANombre: ${n}%0ADirección: ${d}%0ACP: ${c}%0ATel: ${t}`;
            
            window.open(`https://wa.me/522722295010?text=${text}`);
            localStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
