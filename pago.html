<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>JIGA LAB | Datos de Envío</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f9faf7; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #fff; padding: 50px; width: 100%; max-width: 500px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); border-radius: 10px; }
        h2 { font-weight: 200; letter-spacing: 4px; text-transform: uppercase; text-align: center; margin-bottom: 40px; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border: 1px solid #eee; border-radius: 5px; box-sizing: border-box; font-family: 'Inter'; }
        .btn-send { width: 100%; padding: 18px; background: #25d366; color: #fff; border: none; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: 0.3s; border-radius: 5px; }
        .btn-send:hover { background: #121212; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Datos de Entrega</h2>
        <input type="text" id="nom" placeholder="Nombre Completo">
        <input type="text" id="dir" placeholder="Calle, Número y Colonia">
        <input type="text" id="cp" placeholder="Código Postal">
        <input type="tel" id="tel" placeholder="WhatsApp / Teléfono">
        <button class="btn-send" onclick="finish()">Finalizar por WhatsApp</button>
    </div>

    <script>
        function finish() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            if(cart.length === 0) return alert("Tu carrito está vacío");

            let items = cart.map(i => `• ${i.n} (x${i.qty}) - $${i.p*i.qty}`).join('%0A');
            let total = cart.reduce((a, b) => a + (b.p * b.qty), 0);
            
            const n = document.getElementById('nom').value;
            const d = document.getElementById('dir').value;
            const c = document.getElementById('cp').value;
            const t = document.getElementById('tel').value;

            if(!n || !d || !c || !t) return alert("Por favor completa todos los campos");

            const text = `Hola JIGA LAB!%0AQuiero realizar un pedido:%0A%0A${items}%0A%0A*Total:$${total}.00*%0A%0A*DATOS DE ENVÍO:*%0ANombre: ${n}%0ADirección: ${d}%0ACP: ${c}%0ATel: ${t}`;
            
            window.open(`https://wa.me/522722295010?text=${text}`);
            localStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
