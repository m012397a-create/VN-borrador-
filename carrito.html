<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>JIGA LAB | Tu Carrito</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; padding: 50px 8%; background: #f9faf7; }
        h1 { font-weight: 200; letter-spacing: 5px; text-transform: uppercase; text-align: center; }
        table { width: 100%; border-collapse: collapse; background: #fff; margin-top: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        th, td { padding: 25px; text-align: left; border-bottom: 1px solid #eee; }
        th { text-transform: uppercase; font-size: 12px; letter-spacing: 2px; color: #999; }
        .total { text-align: right; margin-top: 30px; font-size: 24px; font-weight: 200; }
        .actions { display: flex; justify-content: space-between; margin-top: 40px; }
        .btn { padding: 15px 35px; text-decoration: none; text-transform: uppercase; letter-spacing: 2px; font-size: 11px; transition: 0.3s; }
        .btn-back { color: #888; border: 1px solid #ddd; }
        .btn-next { background: #121212; color: #fff; border: none; }
        .btn-next:hover { background: #8a9a5b; }
    </style>
</head>
<body>
    <h1>Tu Selección</h1>
    <table>
        <thead><tr><th>Producto</th><th>Cant.</th><th>Precio</th><th>Subtotal</th></tr></thead>
        <tbody id="cart-list"></tbody>
    </table>
    <div class="total" id="total-val">Total: $0.00</div>
    <div class="actions">
        <a href="index.html" class="btn btn-back">Seguir comprando</a>
        <a href="pago.html" class="btn btn-next">Proceder al pedido</a>
    </div>

    <script>
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        const list = document.getElementById('cart-list');
        let t = 0;
        cart.forEach(i => {
            const sub = i.p * i.qty;
            t += sub;
            list.innerHTML += `<tr><td>${i.n}</td><td>${i.qty}</td><td>$${i.p}</td><td>$${sub}</td></tr>`;
        });
        document.getElementById('total-val').innerText = `Total: $${t}.00`;
    </script>
</body>
</html>
