<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>JIGA LAB | Carrito</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --verde: #8a9a5b; --negro: #121212; }
        * { cursor: none !important; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: #f9f9f9; padding: 40px 8%; }
        #cursor-dot { width: 8px; height: 8px; background: var(--verde); position: fixed; transform: translate(-50%, -50%); border-radius: 50%; z-index: 10000; pointer-events: none; }
        #cursor-outline { width: 40px; height: 40px; border: 2px solid var(--verde); position: fixed; transform: translate(-50%, -50%); border-radius: 50%; z-index: 9999; pointer-events: none; transition: 0.1s; }
        
        .cart-container { background: #fff; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h2 { font-weight: 200; letter-spacing: 5px; text-align: center; margin-bottom: 40px; }
        .item { display: flex; justify-content: space-between; padding: 20px 0; border-bottom: 1px solid #eee; }
        .total { text-align: right; font-size: 24px; margin-top: 30px; font-weight: 600; }
        .btn-pago { background: var(--negro); color: #fff; padding: 15px 40px; border: none; border-radius: 10px; float: right; margin-top: 20px; letter-spacing: 2px; }
    </style>
</head>
<body>
<div id="cursor-dot"></div><div id="cursor-outline"></div>

<div class="cart-container">
    <h2>TU SELECCIÓN</h2>
    <div id="cart-list"></div>
    <div class="total" id="total-val">Total: $0.00</div>
    <button class="btn-pago" onclick="window.location.href='pago.html'">PROCEDER AL PEDIDO</button>
    <a href="index.html" style="display:block; margin-top:30px; color:#aaa; text-decoration:none; font-size:12px;">SEGUIR COMPRANDO</a>
</div>

<script>
    function render() {
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        const list = document.getElementById('cart-list');
        let total = 0;
        list.innerHTML = '';
        cart.forEach((i, index) => {
            total += i.p * i.qty;
            list.innerHTML += `<div class="item"><span>${i.n} (x${i.qty})</span><span>$${i.p * i.qty}</span></div>`;
        });
        document.getElementById('total-val').innerText = `Total:$${total}.00`;
    }
    render();

    const dot = document.getElementById("cursor-dot");
    const out = document.getElementById("cursor-outline");
    window.addEventListener("mousemove", e => {
        dot.style.left = out.style.left = e.clientX + "px";
        dot.style.top = out.style.top = e.clientY + "px";
    });
</script>
</body>
</html>
