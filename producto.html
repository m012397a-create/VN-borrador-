<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JIGA LAB | Detalle de Producto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --verde: #8a9a5b; --negro: #121212; --beige: #f4f4f0; }
        body { 
            font-family: 'Inter', sans-serif; margin: 0; 
            background: radial-gradient(circle at top right, #ffffff, var(--beige)); 
            min-height: 100vh; color: var(--negro);
        }
        header { padding: 20px 8%; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); sticky; top: 0; z-index: 100; }
        
        .container { 
            max-width: 1100px; margin: 60px auto; display: grid; 
            grid-template-columns: 1fr 1fr; gap: 40px; padding: 40px;
            background: rgba(255, 255, 255, 0.6); border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.8); box-shadow: 0 20px 40px rgba(0,0,0,0.03);
        }
        .p-image { 
            background: #fff; border-radius: 20px; padding: 40px; 
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.02);
        }
        .p-image img { width: 100%; max-width: 380px; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.1)); transition: 0.5s; }
        .p-image:hover img { transform: scale(1.05) rotate(2deg); }

        .p-details { padding: 20px; display: flex; flex-direction: column; justify-content: center; }
        h1 { font-weight: 200; letter-spacing: 4px; text-transform: uppercase; font-size: 2.2rem; margin: 0; }
        .price { color: var(--verde); font-size: 32px; margin: 15px 0; font-weight: 400; border-bottom: 1px solid #ddd; padding-bottom: 15px; display: inline-block; }
        .description { font-size: 15px; line-height: 1.8; color: #555; margin: 25px 0; text-align: justify; }
        
        .selector-box { background: #fff; padding: 20px; border-radius: 15px; display: flex; align-items: center; gap: 20px; margin-bottom: 25px; border: 1px solid #eee; }
        input { width: 60px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; text-align: center; font-weight: 600; }
        
        .btn-add { 
            background: var(--negro); color: #fff; padding: 20px; border: none; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 3px; font-size: 12px; border-radius: 10px;
            transition: 0.4s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-add:hover { background: var(--verde); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(138, 154, 91, 0.3); }

        @media (max-width: 850px) { .container { grid-template-columns: 1fr; margin: 20px; } }
    </style>
</head>
<body>

<header>
    <div class="logo"><img src="LOGO_JIGA_LAB.png" alt="JIGA LAB" style="height:40px;"></div>
    <a href="index.html" style="text-decoration:none; color:var(--negro); font-size:11px; letter-spacing:2px;">← VOLVER AL CATÁLOGO</a>
</header>

<div class="container">
    <div class="p-image"><img id="main-img" src="" alt=""></div>
    <div class="p-details">
        <h1 id="main-title">Cargando...</h1>
        <div class="price" id="main-price">$0.00</div>
        <p class="description" id="main-desc"></p>
        
        <div class="selector-box">
            <span style="font-size: 12px; letter-spacing: 1px;">CANTIDAD</span>
            <input type="number" id="qty" value="1" min="1">
        </div>
        
        <button class="btn-add" onclick="save()">
            <i class="fas fa-shopping-basket"></i> Añadir al Carrito
        </button>
    </div>
</div>

<script>
    const url = new URLSearchParams(window.location.search);
    const prod = {
        img: url.get('img'),
        n: url.get('nombre'),
        p: parseFloat(url.get('precio')),
        d: url.get('desc')
    };

    document.getElementById('main-img').src = prod.img;
    document.getElementById('main-title').innerText = prod.n;
    document.getElementById('main-price').innerText = `$${prod.p}.00`;
    document.getElementById('main-desc').innerText = prod.d;

    function save() {
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        const q = parseInt(document.getElementById('qty').value);
        const ex = cart.find(i => i.n === prod.n);
        if(ex) { ex.qty += q; } else { cart.push({...prod, qty: q}); }
        localStorage.setItem('cart', JSON.stringify(cart));
        window.location.href = "index.html";
    }
</script>
</body>
</html>
