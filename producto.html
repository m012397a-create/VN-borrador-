<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>JIGA LAB | Producto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --verde: #8a9a5b; --negro: #121212; }
        * { cursor: none !important; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: radial-gradient(circle at top right, #fff, #f4f4f0); min-height: 100vh; }
        
        #cursor-dot { width: 8px; height: 8px; background: var(--verde); position: fixed; transform: translate(-50%, -50%); border-radius: 50%; z-index: 10000; pointer-events: none; }
        #cursor-outline { width: 40px; height: 40px; border: 2px solid var(--verde); position: fixed; transform: translate(-50%, -50%); border-radius: 50%; z-index: 9999; pointer-events: none; transition: 0.1s; }

        header { padding: 20px 8%; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 1000px; margin: 40px auto; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; background: rgba(255,255,255,0.7); padding: 40px; border-radius: 30px; backdrop-filter: blur(10px); border: 1px solid #fff; }
        .p-img img { width: 100%; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.1)); transition: 0.5s; }
        .p-img:hover img { transform: scale(1.05) rotate(3deg); }
        h1 { font-weight: 200; letter-spacing: 4px; text-transform: uppercase; }
        .price { color: var(--verde); font-size: 30px; margin: 20px 0; }
        .desc { font-size: 14px; color: #666; line-height: 1.8; margin-bottom: 30px; }
        .btn-add { background: var(--negro); color: #fff; padding: 15px 30px; border: none; border-radius: 10px; width: 100%; letter-spacing: 2px; }
        .btn-add:hover { background: var(--verde); }
    </style>
</head>
<body>
<div id="cursor-dot"></div><div id="cursor-outline"></div>

<header>
    <img src="LOGO_JIGA_LAB.png" height="40">
    <a href="index.html" style="text-decoration:none; color:#121212; font-size:10px; letter-spacing:2px;">VOLVER</a>
</header>

<div class="container">
    <div class="p-img"><img id="m-img" src=""></div>
    <div class="p-details">
        <h1 id="m-title"></h1>
        <div class="price" id="m-price"></div>
        <p class="desc" id="m-desc"></p>
        <input type="number" id="qty" value="1" min="1" style="padding:10px; width:50px; margin-bottom:20px; border-radius:5px; border:1px solid #ddd;">
        <button class="btn-add" onclick="add()">AÑADIR AL CARRITO</button>
    </div>
</div>

<script>
    const url = new URLSearchParams(window.location.search);
    const p = { img: url.get('img'), n: url.get('nombre'), p: url.get('precio'), d: url.get('desc') };
    document.getElementById('m-img').src = p.img;
    document.getElementById('m-title').innerText = p.n;
    document.getElementById('m-price').innerText = `$${p.p}.00`;
    document.getElementById('m-desc').innerText = p.d;

    function add() {
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        const q = parseInt(document.getElementById('qty').value);
        const ex = cart.find(i => i.n === p.n);
        if(ex) ex.qty += q; else cart.push({...p, qty: q});
        localStorage.setItem('cart', JSON.stringify(cart));
        window.location.href = "index.html";
    }

    const dot = document.getElementById("cursor-dot");
    const out = document.getElementById("cursor-outline");
    window.addEventListener("mousemove", e => {
        dot.style.left = out.style.left = e.clientX + "px";
        dot.style.top = out.style.top = e.clientY + "px";
    });
</script>
</body>
</html>
