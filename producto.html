<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JIGA LAB | Producto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --verde: #8a9a5b; --negro: #121212; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: #f9faf7; padding-bottom: 50px; }
        header { padding: 15px 8%; display: flex; justify-content: space-between; align-items: center; background: #fff; border-bottom: 1px solid #eee; }
        .container { max-width: 1100px; margin: 50px auto; display: flex; flex-wrap: wrap; gap: 50px; padding: 20px; }
        .p-image { flex: 1; min-width: 300px; background: #fff; padding: 40px; text-align: center; border-radius: 15px; }
        .p-image img { width: 100%; max-width: 400px; object-fit: contain; }
        .p-details { flex: 1.2; min-width: 300px; }
        h1 { font-weight: 200; letter-spacing: 3px; text-transform: uppercase; font-size: 2.5rem; }
        .price { color: var(--verde); font-size: 28px; margin: 20px 0; font-weight: 400; }
        .description { font-size: 15px; line-height: 1.8; color: #666; margin-bottom: 40px; text-align: justify; }
        .selector { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        input { width: 60px; padding: 12px; border: 1px solid #ddd; border-radius: 5px; text-align: center; font-size: 16px; }
        .btn-add { background: var(--negro); color: #fff; padding: 18px 45px; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; width: 100%; border-radius: 5px; }
        .btn-add:hover { background: var(--verde); }
    </style>
</head>
<body>

<header>
    <div class="logo"><img src="LOGO_JIGA_LAB.png" alt="JIGA LAB" style="height:40px;"></div>
    <a href="index.html" style="text-decoration:none; color:var(--negro); font-size:12px; letter-spacing:1px;">← VOLVER</a>
</header>

<div class="container">
    <div class="p-image"><img id="main-img" src=""></div>
    <div class="p-details">
        <h1 id="main-title">Producto</h1>
        <div class="price" id="main-price">$0.00</div>
        <p class="description" id="main-desc"></p>
        <div class="selector">
            <span>CANTIDAD:</span>
            <input type="number" id="qty" value="1" min="1">
        </div>
        <button class="btn-add" onclick="save()">Añadir al Carrito</button>
    </div>
</div>

<script>
    const url = new URLSearchParams(window.location.search);
    const prod = {
        img: url.get('img'),
        n: url.get('nombre'),
        p: parseFloat(url.get('precio')),
        d: url.get('desc')
    };

    document.getElementById('main-img').src = prod.img;
    document.getElementById('main-title').innerText = prod.n;
    document.getElementById('main-price').innerText = `$${prod.p}.00`;
    document.getElementById('main-desc').innerText = prod.d;

    function save() {
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        const q = parseInt(document.getElementById('qty').value);
        const ex = cart.find(i => i.n === prod.n);
        if(ex) { ex.qty += q; } else { cart.push({...prod, qty: q}); }
        localStorage.setItem('cart', JSON.stringify(cart));
        window.location.href = "index.html";
    }
</script>
</body>
</html>
