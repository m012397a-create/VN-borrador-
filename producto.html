<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles de Envío | JIGA LAB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --verde: #8a9a5b; --negro: #121212; --fondo: #f4f6f2; }
        body { font-family: 'Inter', sans-serif; margin: 0; color: var(--negro); background: #fff; }
        
        header { padding: 15px 8%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .back { text-decoration: none; color: #121212; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-weight: 600; }

        .main-container { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; padding: 40px 8%; max-width: 1400px; margin: 0 auto; }
        
        /* Lado Izquierdo: Visual */
        .prod-display { text-align: center; }
        .img-container { background: var(--fondo); padding: 40px; border-radius: 4px; margin-bottom: 20px; }
        .img-container img { max-width: 100%; height: 300px; object-fit: contain; }
        
        .info-text { text-align: left; padding: 0 10px; }
        .info-text h1 { font-weight: 200; font-size: 2rem; letter-spacing: 3px; text-transform: uppercase; margin: 10px 0; }
        .price { font-size: 24px; color: var(--verde); margin-bottom: 20px; }
        .desc-title { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #888; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .description { font-size: 14px; line-height: 1.6; color: #555; font-weight: 300; }

        /* Lado Derecho: Formulario */
        .checkout-form { border: 1px solid #eee; padding: 30px; border-radius: 2px; }
        .step-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; display: flex; align-items: center; color: var(--verde); }
        .step-title span { background: var(--verde); color: white; width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; margin-right: 10px; font-size: 10px; }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 9px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; color: #888; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; font-family: 'Inter'; font-size: 13px; box-sizing: border-box; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .btn-enviar { 
            background: var(--negro); color: white; padding: 20px; width: 100%; border: none;
            font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
            cursor: pointer; transition: 0.3s; margin-top: 20px;
        }
        .btn-enviar:hover { background: var(--verde); }

        @media (max-width: 900px) { .main-container { grid-template-columns: 1fr; padding: 20px; } }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back"><i class="fas fa-chevron-left"></i> Volver</a>
    <img src="LOGO_JIGA_LAB.png" alt="Logo" style="height: 30px;">
</header>

<div class="main-container">
    <!-- SECCIÓN IZQUIERDA -->
    <div class="prod-display" id="detalle-producto">
        <!-- Se carga con JS -->
    </div>

    <!-- SECCIÓN DERECHA -->
    <div class="checkout-form">
        <div class="step-title"><span>1</span> Información del Destinatario</div>
        <div class="input-group">
            <label>Nombre Completo</label>
            <input type="text" id="nombre" placeholder="Quién recibe el paquete">
        </div>
        <div class="input-group">
            <label>Teléfono de Contacto</label>
            <input type="tel" id="tel" placeholder="10 dígitos">
        </div>

        <div class="step-title" style="margin-top:40px;"><span>2</span> Detalles de Entrega</div>
        <div class="input-group">
            <label>Calle y Avenida</label>
            <input type="text" id="calle" placeholder="Nombre de la calle">
        </div>
        <div class="row">
            <div class="input-group">
                <label>Número Exterior</label>
                <input type="text" id="num_ext" placeholder="Ej. 123">
            </div>
            <div class="input-group">
                <label>Número Interior</label>
                <input type="text" id="num_int" placeholder="Opcional">
            </div>
        </div>
        <div class="row">
            <div class="input-group">
                <label>Código Postal</label>
                <input type="text" id="cp_envio">
            </div>
            <div class="input-group">
                <label>Colonia</label>
                <input type="text" id="colonia" placeholder="Nombre de la colonia">
            </div>
        </div>
        <div class="input-group">
            <label>Referencias (Opcional)</label>
            <textarea id="ref" rows="2" placeholder="Color de casa, entre qué calles..."></textarea>
        </div>

        <button onclick="enviarPedido()" class="btn-enviar">Confirmar y Enviar Datos</button>
    </div>
</div>

<script>
    // Base de datos con las descripciones reales
    const db = {
        "TESTO_M.png": { 
            n: "TestoVit", 
            p: 520, 
            d: "Fórmula vigorizante natural diseñada para aumentar la energía y vitalidad masculina. Contiene extractos botánicos de alta pureza que apoyan el rendimiento físico y el bienestar diario." 
        },
        "CALCIODEMAGNESIO.png": { 
            n: "Calcio y Magnesio", 
            p: 350, 
            d: "Suplemento esencial para el fortalecimiento óseo y muscular. Ayuda a mantener un sistema nervioso equilibrado y mejora la calidad del descanso." 
        },
        "AJO_NEGRO.png": { 
            n: "Ajo Negro", 
            p: 280, 
            d: "Poderoso antioxidante natural. Mejora la circulación sanguínea y fortalece el sistema inmunológico sin dejar rastro de olor o sabor fuerte." 
        },
        "CITRATO.png": { n: "Citrato de Magnesio", p: 350, d: "Ideal para la relajación muscular y combatir el estrés." },
        "CITRATO_DEPOTASIO.png": { n: "Citrato de Potasio", p: 350, d: "Apoyo vital para la función renal y el equilibrio de líquidos." },
        "COLAGEN_COMPLEX.png": { n: "Colagen Complex", p: 480, d: "Nutrición avanzada para piel, cabello y articulaciones." },
        "CURCUMA.png": { n: "Extracto de Cúrcuma", p: 290, d: "Antiinflamatorio natural y antioxidante de alta potencia." },
        "FENOGRECO_RENDER (1).png": { n: "Fenogreco", p: 310, d: "Apoyo natural para el metabolismo y el sistema digestivo." },
        "GUANABANA_RENDER.png": { n: "Guanábana & Moringa", p: 380, d: "Súper combinación para reforzar las defensas naturales." },
        "ISOFEM.png": { n: "IsoFem Natural", p: 420, d: "Equilibrio y bienestar natural para la mujer." },
        "SILIMARIANO.png": { n: "Silimariano", p: 360, d: "Protección y desintoxicación natural para el hígado." },
        "VINAGRE.png": { n: "Vinagre de Manzana", p: 250, d: "Auxiliar en el control de peso y la digestión saludable." },
        "VITAFEM.png": { n: "VitaFem", p: 390, d: "Multivitamínico completo formulado para la mujer." },
        "VITAMEN.png": { n: "VitaMen", p: 390, d: "Energía y multivitaminas esenciales para el hombre." },
        "VITC.png": { n: "Vitamina C", p: 240, d: "Refuerzo inmunológico y protección antioxidante diaria." }
    };

    const params = new URLSearchParams(window.location.search);
    const imgId = params.get('img');
    const cpPrevia = params.get('cp') || "";
    const producto = db[imgId];

    if (producto) {
        document.getElementById('detalle-producto').innerHTML = `
            <div class="img-container">
                <img src="${imgId}" alt="${producto.n}">
            </div>
            <div class="info-text">
                <h1>${producto.n}</h1>
                <div class="price">$${producto.p}.00</div>
                <div class="desc-title">Descripción del Suplemento</div>
                <p class="description">${producto.d}</p>
                <p style="font-size:9px; color:#aaa; margin-top:20px; letter-spacing:1px;">JIGA LAB | CALIDAD DE EXPORTACIÓN</p>
            </div>
        `;
        document.getElementById('cp_envio').value = cpPrevia;
    }

    function enviarPedido() {
        const nombre = document.getElementById('nombre').value;
        const tel = document.getElementById('tel').value;
        const calle = document.getElementById('calle').value;
        const n_ext = document.getElementById('num_ext').value;
        const cp = document.getElementById('cp_envio').value;
        const col = document.getElementById('colonia').value;

        if(!nombre || !calle || !cp || !col) {
            alert("Por favor rellena los datos de envío.");
            return;
        }

        let mensaje = `*NUEVO PEDIDO JIGA LAB*%0A`;
        mensaje += `--------------------------%0A`;
        mensaje += `*Producto:* ${producto.n}%0A`;
        mensaje += `*DATOS DE ENVÍO*%0A`;
        mensaje += `*Nombre:* ${nombre}%0A`;
        mensaje += `*Tel:* ${tel}%0A`;
        mensaje += `*Dirección:* ${calle} #${n_ext}%0A`;
        mensaje += `*Colonia:* ${col}%0A`;
        mensaje += `*C.P.:* ${cp}%0A`;
        mensaje += `--------------------------`;

        window.open(`https://wa.me/522722295010?text=${mensaje}`, '_blank');
    }
</script>
</body>
</html>
