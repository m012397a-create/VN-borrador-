<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles del Producto | JIGA LAB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --verde-salvia: #8a9a5b; --negro: #121212; --gris-claro: #f4f6f2; }
        body { font-family: 'Inter', sans-serif; color: var(--negro); margin: 0; background: white; }
        
        header { padding: 20px 8%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .btn-back { text-decoration: none; color: var(--negro); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }

        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 50px; padding: 60px 8%; align-items: center; }
        
        .product-image { background: var(--gris-claro); padding: 40px; border-radius: 4px; text-align: center; }
        .product-image img { max-width: 100%; height: 450px; object-fit: contain; }

        .product-info h1 { font-weight: 200; font-size: 2.5rem; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 10px; }
        .price { font-size: 28px; color: var(--verde-salvia); font-weight: 300; margin-bottom: 30px; }
        
        .description { font-size: 14px; line-height: 1.8; color: #555; margin-bottom: 30px; border-top: 1px solid #eee; padding-top: 20px; }
        
        .delivery-info { background: #fdfdfd; border: 1px dashed #ddd; padding: 20px; font-size: 12px; margin-bottom: 30px; }
        .delivery-info i { color: var(--verde-salvia); margin-right: 10px; }

        .btn-whatsapp { 
            background: var(--negro); color: white; text-decoration: none; padding: 18px 40px; 
            display: inline-block; font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
        }
        .btn-whatsapp:hover { background: var(--verde-salvia); }

        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> Volver a la colección</a>
    <img src="LOGO_JIGA_LAB.png" alt="Logo" style="height: 30px;">
</header>

<div class="container" id="product-details">
    <!-- El contenido se genera con JavaScript -->
</div>

<script>
    // Base de datos expandida con descripciones
    const productos = {
        "AJO_NEGRO.png": { n: "Ajo Negro", p: 280, d: "Extracto concentrado de ajo negro madurado. Apoya la salud cardiovascular y el sistema inmunológico sin el sabor fuerte del ajo común." },
        "CALCIODEMAGNESIO.png": { n: "Calcio, Zinc y Magnesio", p: 350, d: "Combinación mineral esencial para el fortalecimiento óseo y la recuperación muscular. Ideal para mantener un metabolismo saludable." },
        "TESTO_M.png": { n: "TestoVit", p: 520, d: "Fórmula vigorizante natural diseñada para el apoyo hormonal masculino y la energía diaria mediante extractos botánicos selectos." },
        "CITRATO.png": { n: "Citrato de Magnesio", p: 350, d: "Magnesio de alta absorción que contribuye al funcionamiento normal del sistema nervioso y reduce el cansancio y la fatiga." },
        "VITC.png": { n: "Vitamina C", p: 240, d: "Poderoso antioxidante que refuerza las defensas naturales del cuerpo y promueve la síntesis de colágeno en la piel." }
        // Agrega aquí el resto siguiendo el mismo formato de la imagen...
    };

    // Obtener el nombre de la imagen de la URL
    const urlParams = new URLSearchParams(window.location.search);
    const imgKey = urlParams.get('img');
    const item = productos[imgKey];

    const detailContainer = document.getElementById('product-details');

    if (item) {
        detailContainer.innerHTML = `
            <div class="product-image">
                <img src="${imgKey}" alt="${item.n}">
            </div>
            <div class="product-info">
                <h1>${item.n}</h1>
                <div class="price">$${item.p}.00</div>
                <div class="description">
                    <p>${item.d}</p>
                    <p><strong>Uso sugerido:</strong> Tomar una cápsula diaria con alimentos. No exceder la dosis recomendada.</p>
                </div>
                <div class="delivery-info">
                    <p><i class="fas fa-truck"></i> <strong>Información de entrega:</strong></p>
                    <p>• Entrega local sin costo en Orizaba, Veracruz.</p>
                    <p>• Envíos a todo México por estafeta/FedEx (2-4 días hábiles).</p>
                </div>
                <a href="https://wa.me/522722295010?text=Hola, me interesa comprar ${item.n}" class="btn-whatsapp">Pedir por WhatsApp</a>
            </div>
        `;
    } else {
        detailContainer.innerHTML = "<h1>Producto no encontrado</h1>";
    }
</script>
</body>
</html>
