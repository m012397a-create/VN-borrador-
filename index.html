<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JIGA LAB | Biotecnología Natural</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --verde-salvia: #8a9a5b; 
            --negro: #1a1a1a; 
            --fondo: #fdfdfb; 
            --max-width: 1200px; /* Ancho máximo para que no se estire en PC */
        }
        
        /* Gestión de Cursor */
        @media (min-width: 1025px) {
            * { cursor: none !important; }
            #cursor-dot, #cursor-outline { display: block; }
        }
        @media (max-width: 1024px) {
            #cursor-dot, #cursor-outline { display: none !important; }
            * { cursor: auto !important; }
        }

        body { font-family: 'Inter', sans-serif; margin: 0; background-color: var(--fondo); color: var(--negro); overflow-x: hidden; }
        
        /* Cursor */
        #cursor-dot { width: 8px; height: 8px; background: var(--verde-salvia); position: fixed; top: 0; left: 0; transform: translate(-50%, -50%); border-radius: 50%; z-index: 10000; pointer-events: none; }
        #cursor-outline { width: 40px; height: 40px; border: 2px solid var(--verde-salvia); position: fixed; top: 0; left: 0; transform: translate(-50%, -50%); border-radius: 50%; z-index: 9999; pointer-events: none; transition: transform 0.1s ease-out; }

        /* HEADER CENTRALIZADO */
        header { 
            background: rgba(255,255,255,0.9); 
            backdrop-filter: blur(10px); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex;
            justify-content: center; /* Centra el contenido interno */
        }

        .header-container {
            width: 100%;
            max-width: var(--max-width);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo img { height: 45px; transition: 0.3s; }

        nav { display: flex; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--negro); margin-left: 25px; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; font-weight: 300; transition: 0.3s; }
        .nav-links a:hover { color: var(--verde-salvia); }
        
        .header-icons { display: flex; align-items: center; margin-left: 20px; border-left: 1px solid #eee; padding-left: 20px; }
        .header-icons a { margin-left: 15px; font-size: 16px; color: var(--negro); }

        /* SLIDER AJUSTADO */
        .hero { 
            position: relative; 
            height: 60vh; /* Bajamos la altura para que no sea eterno en PC */
            background: var(--negro); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .slide { position: absolute; width: 100%; height: 100%; opacity: 0; transition: opacity 1.2s ease; }
        .slide.active { opacity: 1; }
        .slide img { width: 100%; height: 100%; object-fit: cover; opacity: 0.4; }
        
        .hero-content { position: relative; z-index: 10; text-align: center; color: #fff; padding: 0 20px; }
        .hero-content h1 { font-weight: 200; font-size: clamp(2rem, 6vw, 4rem); letter-spacing: 15px; text-transform: uppercase; margin: 0; }
        .hero-content p { font-size: 11px; letter-spacing: 5px; text-transform: uppercase; margin-top: 20px; color: var(--verde-salvia); }

        /* PRODUCTOS EN CONTENEDOR */
        .main-content {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 60px 20px;
        }

        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 30px; 
        }

        .product-card { 
            background: #fff; padding: 30px; border: 1px solid #f0f0f0; border-radius: 12px;
            text-align: center; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            position: relative; top: 0;
        }
        .product-card:hover { top: -10px; border-color: var(--verde-salvia); box-shadow: 0 15px 30px rgba(0,0,0,0.05); }
        .product-card img { width: 100%; max-height: 220px; object-fit: contain; margin-bottom: 20px; }
        
        /* FOOTER FORMAL */
        footer { background: #fff; padding: 60px 20px; text-align: center; border-top: 1px solid #eee; }
        .footer-logo img { height: 50px; margin-bottom: 30px; filter: grayscale(100%); opacity: 0.6; }

        /* RESPONSIVE MÓVIL */
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .hero { height: 50vh; }
            .product-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
            .logo img { height: 35px; }
        }
    </style>
</head>
<body>

<div id="cursor-dot"></div>
<div id="cursor-outline"></div>

<header>
    <div class="header-container">
        <div class="logo"><img src="LOGO_JIGA_LAB.png" alt="JIGA LAB"></div>
        <nav>
            <div class="nav-links">
                <a href="index.html">Inicio</a>
                <a href="#productos">Productos</a>
            </div>
            <div class="header-icons">
                <a href="https://www.instagram.com/jigalab6" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://wa.me/522722295010" target="_blank"><i class="fab fa-whatsapp"></i></a>
                <a href="carrito.html" style="color: var(--verde-salvia); position: relative;">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-count" style="position: absolute; top: -10px; right: -10px; background: #000; color: #fff; font-size: 9px; padding: 2px 5px; border-radius: 10px;">0</span>
                </a>
            </div>
        </nav>
    </div>
</header>

<section class="hero">
    <div class="slide active"><img src="https://images.pexels.com/photos/113335/pexels-photo-113335.jpeg?auto=compress&cs=tinysrgb&w=1600"></div>
    <div class="slide"><img src="https://images.pexels.com/photos/841228/pexels-photo-841228.jpeg?auto=compress&cs=tinysrgb&w=1600"></div>
    <div class="hero-content">
        <h1>JIGA LAB</h1>
        <p>Pureza botánica · Biotecnología avanzada</p>
    </div>
</section>

<main class="main-content" id="productos">
    <div class="product-grid" id="grid"></div>
</main>

<footer>
    <div class="footer-logo"><img src="LOGO_JIGA_LAB.png"></div>
    <div style="font-size: 10px; color: #aaa; letter-spacing: 1px; max-width: 600px; margin: 0 auto; line-height: 1.6;">
        "ESTE PRODUCTO NO ES UN MEDICAMENTO. EL CONSUMO DE ESTE PRODUCTO ES RESPONSABILIDAD DE QUIEN LO RECOMIENDA Y DE QUIEN LO USA."
    </div>
</footer>

<script>
    const productos = [
        { img: "CALCIODEMAGNESIO.png", n: "Calcio, Zinc y Magnesio", p: 350, d: "Fortalece huesos y músculos." },
        { img: "CITRATO_DEPOTASIO.png", n: "Citrato de Potasio", p: 350, d: "Salud renal y equilibrio mineral." },
        { img: "AJO_NEGRO.png", n: "Ajo Negro", p: 280, d: "Antioxidante y salud cardiovascular." },
        { img: "CITRATO.png", n: "Citrato de Magnesio", p: 350, d: "Bienestar nervioso y muscular." }
        // Agrega aquí los demás de tu lista...
    ];

    const grid = document.getElementById('grid');
    productos.forEach(p => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `<img src="${p.img}"><h3>${p.n}</h3><div class="price">$${p.p}.00</div><button style="background:var(--negro);color:#fff;border:none;padding:10px;width:100%;font-size:10px;letter-spacing:1px;border-radius:5px;">DETALLES</button>`;
        card.onclick = () => window.location.href = `producto.html?img=${p.img}&nombre=${p.n}&precio=${p.p}&desc=${encodeURIComponent(p.d)}`;
        grid.appendChild(card);
    });

    // Lógica de Cursor PC
    if (window.innerWidth > 1024) {
        const dot = document.getElementById("cursor-dot");
        const out = document.getElementById("cursor-outline");
        window.addEventListener("mousemove", e => {
            dot.style.left = out.style.left = e.clientX + "px";
            dot.style.top = out.style.top = e.clientY + "px";
        });
    }

    function updateCartCount() {
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        document.getElementById('cart-count').innerText = cart.reduce((a, b) => a + b.qty, 0);
    }
    updateCartCount();

    let cur = 0; const s = document.querySelectorAll('.slide');
    setInterval(() => { s[cur].classList.remove('active'); cur = (cur + 1) % s.length; s[cur].classList.add('active'); }, 5000);
</script>
</body>
</html>
