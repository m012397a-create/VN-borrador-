<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JIGA LAB | Selección Botánica</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --verde: #8a9a5b; --negro: #121212; --gris-claro: #f4f6f2; }
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: #fff; color: var(--negro); overflow-x: hidden; }
        
        /* Top Bar */
        .top-bar { background: var(--gris-claro); padding: 8px 8%; display: flex; justify-content: center; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid #e0e0e0; }
        .top-bar span { margin: 0 15px; color: #666; }

        /* Header */
        header { padding: 20px 8%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: #fff; z-index: 1000; }
        .logo img { height: 45px; }
        nav a { text-decoration: none; color: var(--negro); margin-left: 30px; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; font-weight: 400; }
        .social-icons i { margin-left: 15px; font-size: 14px; cursor: pointer; }

        /* Hero Slider */
        .hero { position: relative; height: 80vh; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .slide { position: absolute; width: 100%; height: 100%; opacity: 0; transition: opacity 1.2s ease-in-out; display: flex; align-items: center; justify-content: center; }
        .slide.active { opacity: 1; }
        .slide img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .hero-content { position: absolute; text-align: center; color: #fff; z-index: 10; }
        .hero-content h1 { font-weight: 200; font-size: 4rem; letter-spacing: 15px; text-transform: uppercase; margin: 0; }
        .hero-content p { font-weight: 300; font-size: 10px; letter-spacing: 5px; text-transform: uppercase; margin-top: 10px; opacity: 0.8; }

        /* Grid de Productos */
        .section-title { text-align: center; padding: 80px 0 40px; }
        .section-title h2 { font-weight: 200; font-size: 1.8rem; letter-spacing: 8px; text-transform: uppercase; position: relative; display: inline-block; }
        .section-title h2::after { content: ''; position: absolute; bottom: -15px; left: 50%; transform: translateX(-50%); width: 40px; height: 1px; background: var(--verde); }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 40px; padding: 0 8% 80px; }
        .product-card { text-align: center; transition: 0.4s; cursor: pointer; text-decoration: none; color: inherit; }
        .product-card:hover { transform: translateY(-5px); }
        .img-wrapper { background: var(--gris-claro); padding: 40px; margin-bottom: 20px; border-radius: 4px; overflow: hidden; }
        .product-card img { width: 100%; height: 250px; object-fit: contain; transition: 0.5s; }
        .product-card:hover img { transform: scale(1.05); }
        .product-card h3 { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; font-weight: 400; margin: 15px 0 5px; }
        .product-card .price { font-size: 14px; color: var(--verde); font-weight: 300; }
        .product-card .tag { font-size: 8px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; display: block; }

        @media (max-width: 768px) { .hero-content h1 { font-size: 2rem; letter-spacing: 8px; } .product-grid { grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 4%; } }
    </style>
</head>
<body>

<div class="top-bar">
    <span><i class="fas fa-map-marker-alt"></i> ENVIAR A: <input type="text" id="cp-input" placeholder="00000" style="background:transparent; border:none; width:45px; font-size:9px; outline:none; color:var(--verde); font-weight:bold;"></span>
    <span>ENVÍO SIN COSTO EN ORIZABA, VERACRUZ</span>
</div>

<header>
    <div class="logo"><img src="LOGO_JIGA_LAB.png" alt="JIGA LAB"></div>
    <nav>
        <a href="#">Inicio</a>
        <a href="#coleccion">Colección</a>
    </nav>
    <div class="social-icons">
        <i class="fab fa-instagram"></i>
        <i class="fab fa-whatsapp"></i>
    </div>
</header>

<section class="hero">
    <!-- REVISA QUE ESTOS NOMBRES SEAN IGUALES A TUS ARCHIVOS -->
    <div class="slide active"><img src="CITRATO.png" alt="Slider 1"></div>
    <div class="slide"><img src="TESTO_M.png" alt="Slider 2"></div>
    <div class="slide"><img src="VITAMEN.png" alt="Slider 3"></div>
    <div class="hero-content">
        <h1>ALTA PUREZA</h1>
        <p>Extractos concentrados premium</p>
    </div>
</section>

<div class="section-title" id="coleccion">
    <h2>Selección Exclusiva</h2>
</div>

<div class="product-grid" id="grid">
    <!-- Se genera automáticamente -->
</div>

<script>
    const productos = [
        { img: "CALCIODEMAGNESIO.png", n: "Calcio, Zinc y Magnesio", p: 350 },
        { img: "TESTO_M.png", n: "TestoVit", p: 520 },
        { img: "AJO_NEGRO.png", n: "Ajo Negro", p: 280 },
        { img: "CITRATO.png", n: "Citrato de Magnesio", p: 350 },
        { img: "CITRATO_DEPOTASIO.png", n: "Citrato de Potasio", p: 350 },
        { img: "COLAGEN_COMPLEX.png", n: "Colagen Complex", p: 480 },
        { img: "CURCUMA.png", n: "Extracto de Cúrcuma", p: 290 },
        { img: "FENOGRECO_RENDER (1).png", n: "Fenogreco", p: 310 },
        { img: "GUANABANA_RENDER.png", n: "Guanábana & Moringa", p: 380 },
        { img: "ISOFEM.png", n: "IsoFem Natural", p: 420 },
        { img: "SILIMARIANO.png", n: "Silimariano", p: 360 },
        { img: "VINAGRE.png", n: "Vinagre de Manzana", p: 250 },
        { img: "VITAFEM.png", n: "VitaFem", p: 390 },
        { img: "VITAMEN.png", n: "VitaMen", p: 390 },
        { img: "VITC.png", n: "Vitamina C", p: 240 }
    ];

    const grid = document.getElementById('grid');
    const cpInput = document.getElementById('cp-input');

    productos.forEach(p => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
            <div class="img-wrapper">
                <img src="${p.img}" alt="${p.n}">
            </div>
            <h3>${p.n}</h3>
            <div class="price">$${p.p}.00</div>
            <span class="tag">Selección JIGA LAB Premium</span>
        `;
        card.onclick = () => {
            const cp = cpInput.value || "00000";
            window.location.href = `producto.html?img=${p.img}&cp=${cp}`;
        };
        grid.appendChild(card);
    });

    // Lógica del Slider
    let currentSlide = 0;
    const slides = document.querySelectorAll('.slide');
    
    function nextSlide() {
        slides[currentSlide].classList.remove('active');
        currentSlide = (currentSlide + 1) % slides.length;
        slides[currentSlide].classList.add('active');
    }
    setInterval(nextSlide, 4000);
</script>

</body>
</html>
