<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JIGA LAB | Biotecnología Natural</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --verde-salvia: #8a9a5b; 
            --verde-claro: #f0f2eb;
            --negro: #1a1a1a; 
            --fondo: #fdfdfb; 
        }
        
        /* Ocultar cursor real solo en PC */
        @media (min-width: 1025px) {
            * { cursor: none !important; }
            #cursor-dot, #cursor-outline { display: block; }
        }

        /* Ocultar cursor de bolita en móviles/tablets */
        @media (max-width: 1024px) {
            #cursor-dot, #cursor-outline { display: none !important; }
            * { cursor: auto !important; }
        }

        body { font-family: 'Inter', sans-serif; margin: 0; background-color: var(--fondo); color: var(--negro); scroll-behavior: smooth; overflow-x: hidden; }
        
        /* Cursor Personalizado */
        #cursor-dot { width: 8px; height: 8px; background: var(--verde-salvia); position: fixed; top: 0; left: 0; transform: translate(-50%, -50%); border-radius: 50%; z-index: 10000; pointer-events: none; display: none; }
        #cursor-outline { width: 40px; height: 40px; border: 2px solid var(--verde-salvia); position: fixed; top: 0; left: 0; transform: translate(-50%, -50%); border-radius: 50%; z-index: 9999; pointer-events: none; transition: transform 0.15s ease-out; display: none; }

        /* Header Ajustado para Móvil */
        header { 
            padding: 10px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(255,255,255,0.95); 
            backdrop-filter: blur(10px); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        
        .logo img { height: 35px; width: auto; }

        nav { display: flex; align-items: center; }
        
        /* Enlaces ocultos o pequeños en móvil para que no choquen */
        .nav-links { display: flex; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--negro); margin-left: 15px; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; font-weight: 400; }
        
        .header-icons { display: flex; align-items: center; margin-left: 10px; border-left: 1px solid #eee; padding-left: 10px; }
        .header-icons a { margin-left: 10px; font-size: 14px; color: var(--negro); }

        /* Ajustes específicos para pantallas pequeñas */
        @media (max-width: 480px) {
            header { padding: 10px 3%; }
            .nav-links { display: none; } /* Ocultamos "Inicio" y "Productos" en móvil para dar espacio */
            .logo img { height: 30px; }
            .header-icons a { margin-left: 8px; font-size: 16px; }
            #cart-count { top: -8px; right: -8px; padding: 1px 4px; }
        }

        /* Hero / Slider Ajustado */
        .hero { position: relative; height: 70vh; background: var(--negro); overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .slide { position: absolute; width: 100%; height: 100%; opacity: 0; transition: opacity 1.5s ease; }
        .slide.active { opacity: 1; }
        .slide img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; }
        
        .hero-content { position: relative; text-align: center; color: #fff; z-index: 10; padding: 0 20px; }
        .hero-content h1 { font-weight: 200; font-size: clamp(1.8rem, 8vw, 4rem); letter-spacing: 10px; text-transform: uppercase; margin: 0; }
        .hero-content p { font-size: clamp(8px, 2vw, 11px); letter-spacing: 4px; text-transform: uppercase; margin-top: 15px; color: var(--verde-claro); }

        /* Grid de Productos Responsivo */
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 15px; 
            padding: 20px 5% 60px; 
        }

        @media (min-width: 768px) {
            .product-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        }

        .product-card { background: #fff; padding: 20px; border: 1px solid #f0f0f0; text-align: center; transition: 0.3s; border-radius: 8px; }
        .product-card img { width: 100%; height: auto; max-height: 180px; object-fit: contain; margin-bottom: 15px; }
        .product-card h3 { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; margin: 5px 0; min-height: 30px; }
        .price { font-size: 16px; color: var(--verde-salvia); margin: 10px 0; font-weight: 600; }
        .btn-comprar { background: var(--negro); color: #fff; padding: 10px; font-size: 9px; letter-spacing: 1px; border: none; width: 100%; border-radius: 4px; }

        /* Footer */
        footer { background: #fff; padding: 50px 8% 30px; text-align: center; border-top: 1px solid #eee; }
        .footer-logo img { height: 40px; margin-bottom: 20px; filter: grayscale(100%); }
        .legal-notice { font-size: 9px; color: #aaa; line-height: 1.6; letter-spacing: 0.5px; }
    </style>
</head>
<body>

<div id="cursor-dot"></div>
<div id="cursor-outline"></div>

<header>
    <div class="logo">
        <img src="LOGO_JIGA_LAB.png" alt="JIGA LAB">
    </div>
    <nav>
        <div class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="#productos">Productos</a>
        </div>
        <div class="header-icons">
            <a href="https://www.instagram.com/jigalab6" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://wa.me/522722295010" target="_blank"><i class="fab fa-whatsapp"></i></a>
            <a href="carrito.html" style="color: var(--verde-salvia); position: relative;">
                <i class="fas fa-shopping-cart"></i>
                <span id="cart-count" style="position: absolute; top: -10px; right: -10px; background: #000; color: #fff; font-size: 9px; padding: 2px 5px; border-radius: 10px;">0</span>
            </a>
        </div>
    </nav>
</header>

<section class="hero">
    <div class="slide active"><img src="https://images.pexels.com/photos/113335/pexels-photo-113335.jpeg?auto=compress&cs=tinysrgb&w=1600"></div>
    <div class="slide"><img src="https://images.pexels.com/photos/841228/pexels-photo-841228.jpeg?auto=compress&cs=tinysrgb&w=1600"></div>
    <div class="hero-content">
        <h1>JIGA LAB</h1>
        <p>Pureza botánica · Biotecnología avanzada</p>
    </div>
</section>

<div class="product-grid" id="grid"></div>

<footer>
    <div class="footer-logo"><img src="LOGO_JIGA_LAB.png"></div>
    <div class="legal-notice">
        "ESTE PRODUCTO NO ES UN MEDICAMENTO. EL CONSUMO DE ESTE PRODUCTO ES RESPONSABILIDAD DE QUIEN LO RECOMIENDA Y DE QUIEN LO USA."
    </div>
</footer>

<script>
    // Tu lógica de productos se mantiene igual
    const productos = [
        { img: "CALCIODEMAGNESIO.png", n: "Calcio, Zinc y Magnesio", p: 350, d: "Fortalece la densidad ósea y muscular." },
        { img: "CITRATO_DEPOTASIO.png", n: "Citrato de Potasio", p: 350, d: "Equilibrio de líquidos y salud renal." },
        { img: "AJO_NEGRO.png", n: "Ajo Negro", p: 280, d: "Antioxidante natural para el corazón." },
        { img: "CITRATO.png", n: "Citrato de Magnesio", p: 350, d: "Relajación muscular y mejor sueño." }
        // ... agrega los demás aquí
    ];

    const grid = document.getElementById('grid');
    productos.forEach(p => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `<img src="${p.img}"><h3>${p.n}</h3><div class="price">$${p.p}.00</div><button class="btn-comprar">VER MÁS</button>`;
        card.onclick = () => window.location.href = `producto.html?img=${p.img}&nombre=${p.n}&precio=${p.p}&desc=${encodeURIComponent(p.d)}`;
        grid.appendChild(card);
    });

    // Lógica del Cursor (Solo se activa si el ancho es mayor a 1024px)
    if (window.innerWidth > 1024) {
        const dot = document.getElementById("cursor-dot");
        const out = document.getElementById("cursor-outline");
        window.addEventListener("mousemove", (e) => {
            dot.style.left = `${e.clientX}px`;
            dot.style.top = `${e.clientY}px`;
            out.animate({ left: `${e.clientX}px`, top: `${e.clientY}px` }, { duration: 500, fill: "forwards" });
        });
    }

    function updateCartCount() {
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        document.getElementById('cart-count').innerText = cart.reduce((acc, item) => acc + item.qty, 0);
    }
    updateCartCount();

    let cur = 0; const s = document.querySelectorAll('.slide');
    setInterval(() => { s[cur].classList.remove('active'); cur = (cur + 1) % s.length; s[cur].classList.add('active'); }, 5000);
</script>
</body>
</html>
