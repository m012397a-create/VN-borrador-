<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JIGA LAB | Biotecnología Natural</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --verde: #8a9a5b; --negro: #121212; --fondo: #f9faf7; }
        * { cursor: none !important; } /* Oculta el cursor real */
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: var(--fondo); color: var(--negro); scroll-behavior: smooth; overflow-x: hidden; }
        
        /* Cursor Personalizado */
        #cursor-dot { width: 8px; height: 8px; background: var(--verde); position: fixed; top: 0; left: 0; transform: translate(-50%, -50%); border-radius: 50%; z-index: 10000; pointer-events: none; }
        #cursor-outline { width: 40px; height: 40px; border: 2px solid var(--verde); position: fixed; top: 0; left: 0; transform: translate(-50%, -50%); border-radius: 50%; z-index: 9999; pointer-events: none; transition: transform 0.15s ease-out; }

        /* Header */
        header { padding: 15px 8%; display: flex; justify-content: space-between; align-items: center; background: #fff; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .logo img { height: 40px; }
        nav { display: flex; align-items: center; }
        nav a { text-decoration: none; color: var(--negro); margin-left: 20px; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; }
        
        .header-icons { display: flex; align-items: center; margin-left: 20px; border-left: 1px solid #eee; padding-left: 20px; }
        .header-icons a { margin-left: 15px; font-size: 16px; color: var(--negro); }
        .cart-link { position: relative; color: var(--verde) !important; }
        #cart-count { position: absolute; top: -10px; right: -12px; background: var(--negro); color: #fff; font-size: 9px; padding: 2px 6px; border-radius: 10px; }

        /* Slider */
        .hero { position: relative; height: 60vh; background: #1a1a1a; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .slide { position: absolute; width: 100%; height: 100%; opacity: 0; transition: opacity 1s ease; }
        .slide.active { opacity: 1; }
        .slide img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; }
        .hero-content { position: relative; text-align: center; color: #fff; z-index: 10; }
        .hero-content h1 { font-weight: 200; font-size: 3rem; letter-spacing: 15px; text-transform: uppercase; margin: 0; }

        /* Grid Productos */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; padding: 40px 8% 80px; }
        .product-card { 
            background: #fff; padding: 30px; border: 1px solid #eee; transition: 0.4s; 
            text-align: center; position: relative; top: 0;
        }
        .product-card:hover { border: 1px solid var(--verde); top: -10px; box-shadow: 0 15px 30px rgba(0,0,0,0.05); }
        .product-card img { width: 180px; height: 220px; object-fit: contain; margin-bottom: 20px; transition: 0.5s; }
        .product-card:hover img { transform: scale(1.1); }
        .product-card h3 { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; height: 40px; }
        .price { font-size: 20px; color: var(--verde); margin-bottom: 20px; }
        .btn-comprar { background: var(--negro); color: #fff; padding: 12px; font-size: 10px; width: 100%; border: none; letter-spacing: 2px; }

        /* Footer */
        footer { background: #fff; padding: 40px 8%; text-align: center; border-top: 1px solid #eee; }
        .legal { font-size: 10px; color: #999; max-width: 700px; margin: 0 auto; letter-spacing: 1px; }
    </style>
</head>
<body>

<div id="cursor-dot"></div>
<div id="cursor-outline"></div>

<header>
    <div class="logo"><img src="LOGO_JIGA_LAB.png" alt="JIGA LAB"></div>
    <nav>
        <a href="index.html">Inicio</a>
        <div class="header-icons">
            <a href="https://www.instagram.com/jigalab6" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://wa.me/522722295010" target="_blank"><i class="fab fa-whatsapp"></i></a>
            <a href="https://www.tiktok.com/@jigalab" target="_blank"><i class="fab fa-tiktok"></i></a>
            <a href="carrito.html" class="cart-link"><i class="fas fa-shopping-cart"></i><span id="cart-count">0</span></a>
        </div>
    </nav>
</header>

<section class="hero">
    <div class="slide active"><img src="https://images.pexels.com/photos/4033324/pexels-photo-4033324.jpeg?auto=compress&cs=tinysrgb&w=1600"></div>
    <div class="slide"><img src="https://images.pexels.com/photos/1037992/pexels-photo-1037992.jpeg?auto=compress&cs=tinysrgb&w=1600"></div>
    <div class="hero-content"><h1>JIGA LAB</h1><p>BIOTECNOLOGÍA NATURAL</p></div>
</section>

<div class="product-grid" id="grid"></div>

<footer>
    <p class="legal">"ESTE PRODUCTO NO ES UN MEDICAMENTO. EL CONSUMO DE ESTE PRODUCTO ES RESPONSABILIDAD DE QUIEN LO RECOMIENDA Y DE QUIEN LO USA."<br>AVISO DE COFEPRIS 2026</p>
</footer>

<script>
    const productos = [
        { img: "CALCIODEMAGNESIO.png", n: "Calcio, Zinc y Magnesio", p: 350, d: "Fortalece huesos y mejora la recuperación muscular." },
        { img: "TESTO_M.png", n: "TestoVit", p: 520, d: "Optimiza niveles de energía y vitalidad masculina." },
        { img: "AJO_NEGRO.png", n: "Ajo Negro", p: 280, d: "Antioxidante superior para presión y defensas." },
        { img: "CITRATO.png", n: "Citrato de Magnesio", p: 350, d: "Reduce estrés y mejora el sueño." },
        { img: "CITRATO_DEPOTASIO.png", n: "Citrato de Potasio", p: 350, d: "Apoyo vital para función renal y electrolitos." },
        { img: "COLAGEN_COMPLEX.png", n: "Colagen Complex", p: 480, d: "Nutre piel, cabello, uñas y articulaciones." },
        { img: "CURCUMA.png", n: "Extracto de Cúrcuma", p: 290, d: "Potente antiinflamatorio natural concentrado." },
        { img: "FENOGRECO_RENDER (1).png", n: "Fenogreco", p: 310, d: "Apoyo hormonal y metabolismo de glucosa." },
        { img: "GUANABANA_RENDER.png", n: "Guanábana & Moringa", p: 380, d: "Eleva defensas y protege las células." },
        { img: "ISOFEM.png", n: "IsoFem Natural", p: 420, d: "Equilibrio hormonal femenino natural." },
        { img: "SILIMARIANO.png", n: "Silimariano", p: 360, d: "Protector y regenerador hepático premium." },
        { img: "VINAGRE.png", n: "Vinagre de Manzana", p: 250, d: "Auxiliar en digestión y control de peso." },
        { img: "VITAFEM.png", n: "VitaFem", p: 390, d: "Multivitamínico integral para la mujer." },
        { img: "VITAMEN.png", n: "VitaMen", p: 390, d: "Complejo vitamínico optimizado para el hombre." },
        { img: "VITC.png", n: "Vitamina C", p: 240, d: "Esencial para colágeno e inmunidad." }
    ];

    const grid = document.getElementById('grid');
    productos.forEach(p => {
        const div = document.createElement('div');
        div.className = 'product-card';
        div.innerHTML = `<img src="${p.img}"><h3>${p.n}</h3><div class="price">$${p.p}</div><button class="btn-comprar">VER DETALLES</button>`;
        div.onclick = () => window.location.href = `producto.html?img=${p.img}&nombre=${p.n}&precio=${p.p}&desc=${encodeURIComponent(p.d)}`;
        grid.appendChild(div);
    });

    // Lógica del Cursor
    const dot = document.getElementById("cursor-dot");
    const out = document.getElementById("cursor-outline");
    window.addEventListener("mousemove", e => {
        dot.style.left = out.style.left = e.clientX + "px";
        dot.style.top = out.style.top = e.clientY + "px";
    });

    // Contador Carrito
    function up() {
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        document.getElementById('cart-count').innerText = cart.reduce((a, b) => a + b.qty, 0);
    }
    up();

    // Slider
    let c = 0; const s = document.querySelectorAll('.slide');
    setInterval(() => { s[c].classList.remove('active'); c = (c+1)%s.length; s[c].classList.add('active'); }, 4000);
</script>
</body>
</html>
